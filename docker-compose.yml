version: '3.8'

services:

  # ─── Infrastructure ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: oms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks: [oms-net]

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: oms-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [oms-net]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: oms-kafka-ui
    depends_on: [kafka]
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [oms-net]

  postgres:
    image: postgres:15-alpine
    container_name: oms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: oms_db
      POSTGRES_USER: oms_user
      POSTGRES_PASSWORD: oms_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [oms-net]

  redis:
    image: redis:7-alpine
    container_name: oms-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks: [oms-net]

  # ─── Microservices ───────────────────────────────────────────────
  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: oms-order-service
    depends_on: [kafka, postgres, redis]
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/oms_db
      SPRING_DATASOURCE_USERNAME: oms_user
      SPRING_DATASOURCE_PASSWORD: oms_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SERVICES_INVENTORY_URL: http://inventory-service:8083
    networks: [oms-net]

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: oms-payment-service
    depends_on: [kafka, postgres]
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/oms_db
      SPRING_DATASOURCE_USERNAME: oms_user
      SPRING_DATASOURCE_PASSWORD: oms_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks: [oms-net]

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: oms-inventory-service
    depends_on: [kafka, postgres]
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/oms_db
      SPRING_DATASOURCE_USERNAME: oms_user
      SPRING_DATASOURCE_PASSWORD: oms_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks: [oms-net]

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: oms-notification-service
    depends_on: [kafka, postgres]
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/oms_db
      SPRING_DATASOURCE_USERNAME: oms_user
      SPRING_DATASOURCE_PASSWORD: oms_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks: [oms-net]

volumes:
  postgres-data:
  redis-data:

networks:
  oms-net:
    driver: bridge
